<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="46%" r="42%">
      <stop offset="0%" stop-color="#f0a830" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!--
    Icon + "OHM" row, both centered at y=295.
    Icon: scale=4, inner scale=0.85 (fills more space now box is gone).
    96×96 outer, center at (500, 295). Spans 452–548.
    "OHM": dominant-baseline=central so y=295 is the visual midline.
    Starts at x=572. ~172px wide → ends ~744. Total span 452–744=292px, center≈598.
  -->
  <g transform="translate(500, 295) scale(4) translate(-12, -12)">
    <g transform="translate(12 12) scale(0.85) translate(-12 -12)">
      <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"
        fill="none" stroke="#f0a830" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- "OHM" — dominant-baseline=central so y aligns with icon center -->
  <text x="572" y="295"
    dominant-baseline="central"
    font-family="'Space Mono', 'Courier New', monospace"
    font-weight="700"
    font-size="96"
    fill="#f0f0f8"
    letter-spacing="3">OHM</text>

  <!-- Tagline — two lines, centered -->
  <text x="600" y="420"
    text-anchor="middle"
    font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif"
    font-weight="400"
    font-size="30"
    fill="#7878a0">Personal kanban for ADHD brains</text>

  <text x="600" y="462"
    text-anchor="middle"
    font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif"
    font-weight="400"
    font-size="30"
    fill="#5a5a88">map energy cycles into a visual workflow</text>
</svg>
